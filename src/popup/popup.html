<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <img src="../../icons/icon-48.png" alt="YouTube Check" class="logo-icon" />
      <div class="header-titles">
        <h1 class="header-title">YouTube Check</h1>
        <p class="header-subtitle">Rastreador de vídeos avaliados</p>
      </div>
    </div>
    <button id="btn-settings" class="icon-btn" title="Configurações" aria-label="Abrir configurações">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Stats Grid -->
  <section class="stats-section" aria-label="Estatísticas">
    <div class="stats-grid">
      <div class="stat-card" id="stat-total">
        <div class="stat-icon stat-icon--total">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="count-total">—</span>
          <span class="stat-label">Total</span>
        </div>
      </div>

      <div class="stat-card" id="stat-viewed">
        <div class="stat-icon stat-icon--viewed">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="count-viewed">—</span>
          <span class="stat-label">Visualizados</span>
        </div>
      </div>

      <div class="stat-card" id="stat-liked">
        <div class="stat-icon stat-icon--liked">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="count-liked">—</span>
          <span class="stat-label">Curtidos</span>
        </div>
      </div>

      <div class="stat-card" id="stat-disliked">
        <div class="stat-icon stat-icon--disliked">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="count-disliked">—</span>
          <span class="stat-label">Não curtidos</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Progress Bar -->
  <div class="progress-section" aria-label="Progresso de vídeos visualizados">
    <div class="progress-header">
      <span class="progress-label">Taxa de visualização</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="progress-pct">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <!-- Recent Videos History -->
  <section class="history-section" aria-label="Histórico recente">
    <div class="history-header">
      <span class="history-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Histórico recente
      </span>
      <span class="history-count" id="history-count"></span>
    </div>

    <!-- Empty state -->
    <div class="history-empty" id="history-empty">
      <div class="history-empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
          <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
        </svg>
      </div>
      <p class="history-empty-title">Nenhum vídeo rastreado ainda</p>
      <p class="history-empty-desc">Abra um vídeo no YouTube e dê Like ou Dislike para começar a rastrear.</p>
    </div>

    <!-- Video list -->
    <ul class="history-list" id="history-list" aria-label="Vídeos rastreados recentes"></ul>
  </section>

  <!-- Actions -->
  <section class="actions-section" aria-label="Ações">
    <button id="btn-refresh" class="action-btn action-btn--primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Atualizar dados
    </button>

    <div class="actions-row">
      <button id="btn-export" class="action-btn action-btn--secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Exportar JSON
      </button>

      <button id="btn-import" class="action-btn action-btn--secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Importar JSON
      </button>
    </div>

    <button id="btn-clear" class="action-btn action-btn--danger">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
      Limpar histórico
    </button>
  </section>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none;" />

  <!-- Footer -->
  <footer class="popup-footer">
    <span>Desenvolvido por</span>
    <a href="https://www.brunocastro.dev" target="_blank" rel="noopener" class="footer-link">Bruno Castro</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
